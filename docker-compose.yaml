services:
  api:
    container_name: api
    build:
      context: .
      dockerfile: src/Todolist.Api/Dockerfile
    ports:
      - 5000:8080
    environment:
      - ConnectionStrings__Application=Server=database;Database=todo_db;User Id=admin;Password=mbstdQrYo12A79Dkx0hI68lb;Port=5432;
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - database

    networks:
      - todo-network

  database:
    container_name: database
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=mbstdQrYo12A79Dkx0hI68lb
      - POSTGRES_DB=todo_db
    ports:
      - 54321:5432
    networks:
      - todo-network
    volumes:
      - db_data:/var/lib/postgresql/data

networks:
  todo-network:
    driver: bridge

volumes:
  db_data:
